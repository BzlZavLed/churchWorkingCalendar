[program:church-calendar-reverb]
directory=/var/www/churchWorkingCalendar
command=/usr/bin/php artisan reverb:start --host=0.0.0.0 --port=8080
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/supervisor/church-calendar-reverb.log
stopsignal=QUIT
